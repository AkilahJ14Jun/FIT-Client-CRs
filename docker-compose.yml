version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: fit_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fit_db
      MYSQL_USER: fit_user
      MYSQL_PASSWORD: fit_password
    ports:
      - "3308:3306"
    volumes:
      - fit_mysql_data_v2:/var/lib/mysql
    restart: unless-stopped

volumes:
  fit_mysql_data_v2:
